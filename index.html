<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ELO Güsak</title>

  <style>
    @font-face {
      font-family: 'Radikal';
      src: url('fonts/radikal-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Radikal';
      src: url('fonts/radikal-bold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Radikal';
      src: url('fonts/radikal-black.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Radikal', sans-serif;
      background-color: #f5f5f5;
      color: #1a1a1a;
      padding: 32px 20px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo-circle {
      width: 48px;
      height: 48px;
      background: #37003c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-circle img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* Fallback si no hay logo.png */
    .logo-circle svg {
      width: 28px;
      height: 28px;
      fill: #00ff85;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #37003c;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 9px 18px;
      background-color: #e8e8e8;
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      cursor: pointer;
      font-family: 'Radikal', sans-serif;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab:hover {
      background-color: #d0d0d0;
    }

    .tab.active {
      background-color: #37003c;
      color: #ffffff;
    }

    /* ── Ranking card ── */
    .ranking {
      display: none;
      max-width: 700px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .ranking.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #37003c;
      color: #fff;
      font-family: 'Radikal', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
    }

    thead th:first-child {
      text-align: left;
      padding-left: 18px;
    }

    /* ELO header slightly darker */
    thead th:last-child {
      background: #4a0057;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    td {
      padding: 13px 14px;
      text-align: center;
      white-space: nowrap;
      color: #1a1a1a;
      font-size: 14px;
    }

    /* Pos column */
    td.col-pos {
      font-weight: 700;
      font-size: 13px;
      color: #888;
      width: 36px;
      padding-left: 18px;
      text-align: left;
    }

    /* Name column */
    td.col-name {
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    /* ELO column */
    td.col-elo {
      font-weight: 700;
      font-size: 15px;
      color: #37003c;
    }

    /* Numbers columns */
    td.col-num {
      font-size: 13px;
      color: #444;
      font-variant-numeric: tabular-nums;
    }

    /* ── Separador visual entre top y resto (opcional) ── */
    tbody tr:nth-child(2) td {
      border-top: 2px dashed #f0f0f0;
    }

    @media (max-width: 600px) {
      body { padding: 16px 10px; }
      table { font-size: 12px; }
      td, thead th { padding: 9px 7px; }
      header h1 { font-size: 18px; }
      .avatar { width: 26px; height: 26px; font-size: 9px; }
      td.col-name { max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-circle">
      <!-- Intenta cargar logo.png; si no existe se muestra el SVG de escudo -->
      <img src="logo.png" alt="Güsak" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <svg style="display:none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/>
      </svg>
    </div>
    <div>
      <h1>Ranking ELO Güsak</h1>
      <p id="subtitulo">Cargando clasificación…</p>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showRanking('futbol', this)">⚽ Fútbol</button>
    <button class="tab" onclick="showRanking('mus', this)">🃏 Mus</button>
  </div>

  <div id="futbol" class="ranking active">
    <table>
      <thead>
        <tr>
          <th style="text-align:left; padding-left:18px;">#</th>
          <th style="text-align:left;">Jugador</th>
          <th>ELO</th>
          <th>PCT</th>
          <th>PJ</th>
          <th>V</th>
          <th>D</th>
        </tr>
      </thead>
      <tbody id="tbody-futbol"></tbody>
    </table>
  </div>

  <div id="mus" class="ranking">
    <table>
      <thead>
        <tr>
          <th style="text-align:left; padding-left:18px;">#</th>
          <th style="text-align:left;">Jugador</th>
          <th>ELO</th>
          <th>PCT</th>
          <th>PJ</th>
          <th>V</th>
          <th>D</th>
        </tr>
      </thead>
      <tbody id="tbody-mus"></tbody>
    </table>
  </div>

  <script>
    const urls = {
      futbol: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6FZZe3x0lW1-5EIl1J64CM087PlaEpSKGznZ8CNOFwFqZdpIN36zzz3pZAziH9SASn8cbe0-ZQ1zQ/pub?gid=0&single=true&output=csv",
      mus:    "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6FZZe3x0lW1-5EIl1J64CM087PlaEpSKGznZ8CNOFwFqZdpIN36zzz3pZAziH9SASn8cbe0-ZQ1zQ/pub?gid=744508119&single=true&output=csv"
    };

    // Misma paleta que la Quiniela para consistencia visual
    const AVATAR_CONFIG = {
      'Ander':  { bg: '#FF4F00', color: '#000000' },
      'Rodri':  { bg: '#7B0024', color: '#FFFFFF' },
      'Sertu':  { bg: '#003B7B', color: '#FDB913' },
      'Danel':  { bg: '#4D3625', color: '#FFFFFF' },
      'Josu':   { bg: '#008852', color: '#FFFFFF' },
      'Markel': { bg: '#FDE100', color: '#000000' },
      'Ibon':   { bg: '#A0CE4E', color: '#000000' },
      'Rio':    { bg: '#F7A1B5', color: '#000000' },
      'Salva':  { bg: '#1D1D1B', color: '#E51D87' },
      'Galder': { bg: '#FFF200', color: '#00A651' },
      'Carre':  { bg: '#00D2BE', color: '#000000' },
      'Ima':    { bg: '#4B2E83', color: '#FFFFFF' },
      'Beñat':  { bg: '#004812', color: '#EAE827' },
      'Melo':   { bg: '#008929', color: '#FFFFFF' },
    };
    const FALLBACK = { bg: '#888', color: '#fff' };

    function initials(name) {
      return name.trim().substring(0, 2).toUpperCase();
    }

    function avatarHTML(nombre) {
      const cfg = AVATAR_CONFIG[nombre] || FALLBACK;
      return `<div class="avatar" style="background:${cfg.bg}; color:${cfg.color}">${initials(nombre)}</div>`;
    }

    function showRanking(id, tabElement) {
      document.querySelectorAll('.ranking').forEach(r => r.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      tabElement.classList.add('active');
    }

    function cargarRanking(url, tbodyId, sport) {
      fetch(url)
        .then(res => res.text())
        .then(data => {
          const filas = data.trim().split(/\r?\n/).slice(1);

          const jugadores = filas.map(linea => {
            const columnas = linea.split(",");
            return {
              nombre: columnas[0] ? columnas[0].trim() : "",
              elo:    parseFloat(columnas[1]) || 0,
              pct:    parseFloat(columnas[2] ? columnas[2].replace(",", ".") : 0) || 0,
              pj:     parseInt(columnas[3]) || 0,
              v:      parseInt(columnas[4]) || 0,
              d:      parseInt(columnas[5]) || 0
            };
          }).filter(j => j.nombre !== "");

          jugadores.sort((a, b) => b.elo - a.elo);

          if (sport === 'futbol') {
            document.getElementById('subtitulo').textContent =
              `${jugadores.length} jugadores · Fútbol & Mus`;
          }

          const tbody = document.getElementById(tbodyId);
          tbody.innerHTML = "";

          jugadores.forEach((j, i) => {
            const pos = i + 1;
            const tr = document.createElement("tr");

            tr.innerHTML = `
              <td class="col-pos">${pos}</td>
              <td class="col-name">
                <div class="player-cell">
                  ${avatarHTML(j.nombre)}
                  <span>${j.nombre}</span>
                </div>
              </td>
              <td class="col-num">${j.pct.toFixed(3)}</td>
              <td class="col-num">${j.pj}</td>
              <td class="col-num">${j.v}</td>
              <td class="col-num">${j.d}</td>
              <td class="col-elo">${Math.round(j.elo)}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(err => {
          console.error("Error cargando " + tbodyId, err);
          document.getElementById('subtitulo').textContent = 'Error al cargar los datos.';
        });
    }

    window.onload = () => {
      cargarRanking(urls.futbol, "tbody-futbol", "futbol");
      cargarRanking(urls.mus,    "tbody-mus",    "mus");
    };
  </script>

</body>
</html>
